<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ-SHOP | Les Tendances Temu & Shein en Algérie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
    </style>
</head>
<body class="text-gray-800">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-600 tracking-tighter">DZ-SHOP <span class="text-gray-400 text-sm font-light">| Algérie</span></h1>
            <div class="relative">
                <i class="fa-solid fa-cart-shopping text-2xl text-gray-600 cursor-pointer" onclick="toggleCart()"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">0</span
            </div}
        </div}
    </nav>
    <header class="bg-orange-600 text-white py-12 px-4 text-center">
        <h2 class="text-3xl md:text-5xl font-bold mb-4">Le meilleur de Temu & Shein <br> livrés chez vous ! 🇩🇿</h2>
        <p class="text-lg opacity-90 mb-6">Prix imbattables | Qualité Garantie | Livraison Rapide</p>
        <a href="#produits" class="bg-white text-orange-600 px-8 py-3 rounded-full font-bold text-lg hover:bg-gray-100 transition shadow-lg">Voir le Catalogue</a>
    </header>
    <main id="produits" class="container mx-auto px-4 py-12">
        <h3 class="text-2xl font-bold text-center mb-10">Nos Articles Tendances</h3>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-grid"></div>
    </main>
    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Votre Panier</h3>
                <i class="fa-solid fa-xmark text-2xl cursor-pointer" onclick="toggleCart()"></i>
            </div>
            <div id="cart-items" class="space-y-4 mb-6 max-h-60 overflow-y-auto"></div>
            <div class="border-t pt-4">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total:</span>
                    <span id="cart-total" class="text-orange-600">0 DZD</span>
                </div>
                <button onclick="checkout()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 transition flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i> Commander via WhatsApp
                </button>
            </div>
        </div>
    </div}
    <a href="https://wa.me/213XXXXXXXXX" target="_blank" class="whatsapp-float bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition">
        <i class="fa-brands fa-whatsapp text-3xl"></i>
    </a>
    <script>
        const products = [
            { id: 1, name: "Montre Connectée Ultra", price: 4500, img: "https://images.unsplash.com/photo-1523275335795-d4158C055352?w=500" },
            { id: 2, name: "Écouteurs Sans Fil Pro", price: 2800, img: "https://images.unsplash.com/photo-1505740420927-68aB2dc7H8d?w=500" },
            { id: 3, name: "Sacs à main Luxe Shein", price: 3200, img: "https://images.unsplash.com/photo-1584917865445-673282S57f?w=500" },
            { id: 4, name: "Gadget Cuisine Temu", price: 1500, img: "https://images.unsplash.com/photo-1556910102-82a795767adc?w=500" },
            { id: 5, name: "Vêtements Tendance Homme", price: 5500, img: "https://images.unsplash.com/photo-1521572163863-39637bcS2c5?w=500" },
            { id: 6, name: "Accessoires Beauté Pro", price: 1200, img: "https://images.unsplash.com/photo-1522335789203-aB659xnxu?w=500" },
        ];
        let cart = [];
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white p-3 rounded-2xl shadow-sm border hover:shadow-md">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-xl mb-4">
                    <h4 class="font-semibold text-gray-700 truncate">${p.name}</h4>
                    <p class="text-orange-600 font-bold text-lg mb-3">${p.price} DZD</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-gray-800 text-white py-2 rounded-lg font-medium hover:bg-orange-600 transition">Ajouter au panier</button>
                </div>
            `).join('');
        }
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }
        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            const totalDiv = document.getElementById('cart-total');
            itemsDiv.innerHTML = cart.map((p, idx) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg">
                    <span class="text-sm font-medium truncate">${p.name}</span>
                    <div class="flex items-center gap-3">
                        <span class="font-bold">${p.price} DZD</span>
                        <i class="fa-solid fa-trash-can text-red-500 cursor-pointer" onclick="removeFromCart(${idx})"></i>
                    </div>
                </div>
            `).join('');
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            totalDiv.innerText = `${total} DZD`;
        }
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function checkout() {
            if (cart.length === 0) return alert("Votre panier est vide !");
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            const items = cart.map(p => p.name).join(', ');
            const message = `Bonjour DZ-SHOP ! Je souhaite commander les articles suivants : ${items}. Total : ${total} DZD.`;
            window.open(`https://wa.me/213XXXXXXXXX?text=${encodeURIComponent(message)}`, '_blank');
        }
        renderProducts();
    </script>
</body>
</html>
